<main class="flex-1 max-w-6xl mx-auto w-full p-8 md:p-12">

<button class="step-card active w-full text-left p-6 bg-surface border border-border transition-all hover:border-primary rounded-xl" id="step-1" onclick="activateStep(1)">

<p class="text-xs text-text-secondary">Define core connection parameters</p>
</button>
<button class="step-card w-full text-left p-6 bg-slate-50/50 border border-border transition-all hover:border-primary rounded-xl" id="step-2" onclick="activateStep(2)">
<h3 class="font-bold text-sm mb-1 uppercase tracking-wider text-text-secondary">Step 2</h3>
<p class="text-xs text-text-secondary">Configure security protocols</p>
</button>
<button class="step-card w-full text-left p-6 bg-slate-50/50 border border-border transition-all hover:border-primary rounded-xl" id="step-3" onclick="activateStep(3)">
<h3 class="font-bold text-sm mb-1 uppercase tracking-wider text-text-secondary">Step 3</h3>
<p class="text-xs text-text-secondary">Establish data routing rules</p>
</button>
<button class="step-card w-full text-left p-6 bg-slate-50/50 border border-border transition-all hover:border-primary rounded-xl" id="step-4" onclick="activateStep(4)">

</div>

    "connection": {
        "id": "ENFORX_ALPHA_01",
        "provider": "INTERNAL_MESH",
        "timeout_ms": 5000,
        "retry_policy": "EXPONENTIAL"
    }
}</textarea>

</div>
</div>

<script>
        const configs = {
            1: '{\n    "connection": {\n        "id": "ENFORX_ALPHA_01",\n        "provider": "INTERNAL_MESH",\n        "timeout_ms": 5000,\n        "retry_policy": "EXPONENTIAL"\n    }\n}',
            2: '{\n    "security": {\n        "encryption": "AES-256-GCM",\n        "mfa_required": true,\n        "auth_token_ttl": 3600,\n        "ip_whitelist": ["10.0.0.1/24"]\n    }\n}',
            3: '{\n    "routing": {\n        "default_egress": "US-EAST-1",\n        "failover": "EU-WEST-1",\n        "data_residency": "STRICT",\n        "compression": "LZ4"\n    }\n}',
            4: '{\n    "deployment": {\n        "environment": "PRODUCTION",\n        "canary_enabled": true,\n        "traffic_split": 0.05,\n        "rollback_on_error": true\n    }\n}'
        };

        function activateStep(stepNum) {
            // Remove active classes
            document.querySelectorAll('.step-card').forEach(card => {
                card.classList.remove('active', 'bg-surface', 'border-primary', 'shadow-sm');
                card.classList.add('bg-slate-50/50', 'border-border');
            });

            // Add active class to selected
            const activeCard = document.getElementById(`step-${stepNum}`);
            activeCard.classList.add('active', 'bg-surface', 'border-primary');
            activeCard.classList.remove('bg-slate-50/50', 'border-border');

            // Update panel content
            document.getElementById('panel-title').textContent = `Configuration: Step ${stepNum}`;
            document.getElementById('config-editor').value = configs[stepNum];
        }
    </script>
